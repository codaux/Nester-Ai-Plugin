<!doctype html>
<html lang="fa">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nester</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="panel">
    <div id="header"><h1>W E ⁜ N E S T</h1></div>
    <form id="settings-form">
      <section class="section">
        <div class="grid">
          <label class="field field-icon">
            <span class="sr-only">Width</span>
            <div class="input-with-icon">
              <img src="icons/W.png" alt="" class="input-icon" />
              <input id="sheetWidthIn" type="number" step="0.01" min="0.01" />
            </div>
          </label>
          <label class="field field-icon">
            <span class="sr-only">Max Length</span>
            <div class="input-with-icon">
              <img src="icons/H.png" alt="" class="input-icon" />
              <input id="maxLengthIn" type="number" step="0.01" min="0.01" />
            </div>
          </label>
          <label class="field field-icon">
            <span class="sr-only">Spacing</span>
            <div class="input-with-icon">
              <img src="icons/S.png" alt="" class="input-icon" />
              <input id="spacingIn" type="number" step="0.01" min="0" />
            </div>
          </label>
        </div>
      </section>

      <section class="section">
        <div class="grid settings-top-grid">
          <label class="field">
            <span>Layout Preset</span>
            <select id="optimizePreset">
              <option value="Auto">Auto (Recommended)</option>
              <option value="Compact">Compact</option>
              <option value="Balanced">Balanced</option>
              <option value="Ordered">Ordered</option>
            </select>
          </label>
          <label class="field">
            <span>Solver Effort</span>
            <select id="searchEffort">
              <option value="Normal">Normal</option>
              <option value="High">High</option>
            </select>
          </label>
          <div class="rotation-stack">
            <label class="check check-grid">
              <input id="allowItemRotationInBlock" type="checkbox" />
              <span>↺ Item</span>
            </label>
            <label class="check check-grid">
              <input id="allowBlockRotationOnSheet" type="checkbox" />
              <span>↺ Block</span>
            </label>
          </div>
        </div>
      </section>

      <section class="section inventory-section">
        <div class="section-head">
          <span id="inventory-meta" class="inventory-meta">Run NEST once to load items</span>
        </div>
        <div class="inventory-order-tools">
          <button id="btn-order-email" class="inventory-order-btn secondary" type="button">Paste Order</button>
        </div>
        <div id="order-email-wrap" class="order-email-wrap" hidden>
          <textarea
            id="order-email-text"
            class="order-email-text"
            rows="4"
            spellcheck="false"
            placeholder="Paste the order email text here"
          ></textarea>
        </div>
        <p id="inventory-empty" class="inventory-empty">After the first nest, each file will appear here with an editable quantity.</p>
        <div id="inventory-list" class="inventory-table" hidden></div>
      </section>

      <section class="section naming-section">
        <div class="result-name-fields">
          <div class="grid grid-3-tight grid-4-tight">
            <label class="field">
              <div class="number-field">
                <span class="input-knit">Date</span>
                <input id="outputDate" class="number-field-input" type="number" min="1" max="31" step="1" inputmode="numeric" />
                <div class="number-stepper">
                  <button class="number-stepper-btn" type="button" data-step-target="outputDate" data-step-dir="1" aria-label="Increase date"></button>
                  <button class="number-stepper-btn" type="button" data-step-target="outputDate" data-step-dir="-1" aria-label="Decrease date"></button>
                </div>
              </div>
            </label>
            <label class="field">
              <div class="number-field">
                <span class="input-knit">Pcs</span>
                <input id="outputPcCount" class="number-field-input" type="number" min="1" max="9" step="1" inputmode="numeric" />
                <div class="number-stepper">
                  <button class="number-stepper-btn" type="button" data-step-target="outputPcCount" data-step-dir="1" aria-label="Increase pcs"></button>
                  <button class="number-stepper-btn" type="button" data-step-target="outputPcCount" data-step-dir="-1" aria-label="Decrease pcs"></button>
                </div>
              </div>
            </label>
            <label class="field">
              <div class="number-field">
                <span class="input-knit">Choke</span>
                <input id="outputChokeCount" class="number-field-input" type="number" min="1" max="8" step="1" inputmode="numeric" />
                <div class="number-stepper">
                  <button class="number-stepper-btn" type="button" data-step-target="outputChokeCount" data-step-dir="1" aria-label="Increase choke"></button>
                  <button class="number-stepper-btn" type="button" data-step-target="outputChokeCount" data-step-dir="-1" aria-label="Decrease choke"></button>
                </div>
              </div>
            </label>
            <label class="field">
              <div class="number-field">
                <span class="input-knit">Part</span>
                <input id="outputPartCount" class="number-field-input" type="number" min="0" max="9" step="1" inputmode="numeric" />
                <div class="number-stepper">
                  <button class="number-stepper-btn" type="button" data-step-target="outputPartCount" data-step-dir="1" aria-label="Increase part"></button>
                  <button class="number-stepper-btn" type="button" data-step-target="outputPartCount" data-step-dir="-1" aria-label="Decrease part"></button>
                </div>
              </div>
            </label>
          </div>

          <div class="tag-list" aria-label="Output tags">
            <label class="tag-pill"><input id="tagUSA" type="checkbox" /><span>USA</span></label>
            <label class="tag-pill"><input id="tagRUSH" type="checkbox" /><span>RUSH</span></label>
            <label class="tag-pill"><input id="tagOverNight" type="checkbox" /><span>OverNight</span></label>
            <label class="tag-pill"><input id="tagCUT" type="checkbox" /><span>CUT</span></label>
            <label class="tag-pill"><input id="tagPurolator" type="checkbox" /><span>Purolator</span></label>
            <label class="tag-pill"><input id="tagGLS" type="checkbox" /><span>GLS</span></label>
            <label class="tag-pill"><input id="tagINTERNAL" type="checkbox" /><span>INTERNAL</span></label>
            <label class="tag-pill"><input id="tagREPRINT" type="checkbox" /><span>REPRINT</span></label>
          </div>

          <div class="result-name-wrap">
            <textarea id="result-name-field" class="result-size-button result-name-input" rows="2" readonly spellcheck="false">UVM__--</textarea>
            <button id="btn-regenerate-name" class="result-name-reset" type="button" aria-label="Regenerate output name" title="Clear custom name and rebuild from current settings">&#8635;</button>
          </div>
        </div>
      </section>

      <div class="actions-sticky">
        <div class="actions actions-main">
          <button id="btn-run" type="submit">NEST</button>
          <div class="export-action">
            <button id="btn-export" type="button">EXPORT</button>
            <button id="btn-export-folder" type="button" class="icon-button" aria-label="Choose extra export folder" title="Choose extra export folder">
              <img src="icons/folder.png" alt="" class="icon-button-img" />
            </button>
          </div>
          <button id="btn-reset" type="button" class="secondary">Reset Defaults</button>
        </div>
        <div id="panel-feedback" class="panel-feedback" hidden aria-live="polite"></div>
      </div>
    </form>
    <div class="actions footer-actions">
      <h3>Made by REZA @ WeMust</h3>
      <h3>version 0.3.0</h3>
    </div>
  </main>

  <script src="panel.js"></script>
</body>
</html>
